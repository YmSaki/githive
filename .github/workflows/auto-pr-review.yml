name: Claude PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]

# 同一PRへの連続pushでは古いレビューを中断して最新だけ走らせる
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # draft PRはレビューしない（ready_for_review で拾う）
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # レビュー中に検証コマンドを実行できるようにする
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "jsonschema>=4.18"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          prompt: |
            このPRをレビューし、レビュー後に未解決事項のissue化まで行ってください。

            ## 手順

            ### 1. 文脈の取得
            - `gh pr view ${{ github.event.pull_request.number }} --json title,body` でPR本文を読む。
            - PR本文の `Closes #N` / `Fixes #N` / `#N` 参照から紐づくissueを特定し、
              `gh issue view N` で受け入れ条件を読む。紐づくissueが無い場合は
              「issue紐付けなし」とレビュー冒頭に明記し、diffの意図をPR本文から推定して続行する。
            - CLAUDE.md と docs/13-roadmap.md の該当フェーズの exit criteria を読む。

            ### 2. プロジェクト固有の不変条件チェック（最優先。CLAUDE.md が正）
            - canonical JSON: encoding/json の直接importが internal/core/event 以外に
              増えていないか（scripts/check-canonical-json.sh を実行して確認）。
            - 決定性: fold規則・実体化の変更が「同一イベント集合→byte同一ツリー」を
              壊す可能性がないか。map走査順・時刻・乱数への依存を疑う。
            - fold意味論を変える変更に schema_version 昇格が伴っているか。
            - spec同期: internal/core/materialize の変更に対応する
              spec/reference/*.py と spec/vectors/ の更新が同じPRに含まれているか。
            - 層方向: cmd→app→core の一方通行が守られているか。
            - 設計逸脱がある場合、docs/adr/ にADRが追加されているか。

            ### 3. 一般品質チェック
            - 命名・責務分離・コメントの適切さ（このリポジトリの既存コードの流儀に合わせる）。
            - セキュリティ: 信頼境界（CLI=操作者本人 / MCP=untrusted Agent）をまたぐ
              入力検証、パス走査、ファイル読み取り経路。
            - テスト: issueの受け入れ条件に対応するテストが存在し、境界・異常系を
              含むか。`go test ./...` と `python3 spec/validate.py` を実際に実行し
              結果をレビューに含める。
            - パフォーマンス: 明確に立証できる非効率（O(n²)化、全件再読み込み等）のみ
              指摘する。推測ベースの最適化提案はしない。
            - スコープ: 紐づくissueの範囲外のコード・ドキュメント変更が混入して
              いないか。混入があれば列挙する。

            ### 4. レビュー出力
            - 指摘は blocking / non-blocking / nit の3段階に分類する。
            - 各指摘に、再現条件または該当行と、根拠（実行結果・docs参照）を付ける。
            - コード行に対する指摘はinlineコメントで、総評はstickyコメントに書く。

            ### 5. issue管理（レビュー後に必ず実施）
            - non-blocking指摘のうちこのPRで直すべきでないもの（設計負債・後続作業）は、
              `gh issue list --search` で重複が無いことを確認したうえで
              `gh issue create` でissue化する。タイトルは「対象パッケージ: 内容」形式の
              日本語、本文に発生元PR番号 (#${{ github.event.pull_request.number }}) と
              該当ファイル・行、修正の受け入れ条件を書き、ラベル `from-review` を付ける
              （ラベルが無ければ `gh label create from-review` で作成）。
            - 起票したissueの一覧をstickyコメント末尾に「後続issue」として列挙する。
            - blocking指摘はissue化せず、このPRで修正すべきものとして明示する。
          claude_args: |
            --model claude-sonnet-5
            --max-turns 70
            --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue create:*),Bash(gh label list:*),Bash(gh label create:*),Bash(gh pr comment:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(go test:*),Bash(go vet:*),Bash(gofmt:*),Bash(python3 spec/validate.py:*),Bash(bash scripts/check-canonical-json.sh:*),mcp__github_inline_comment__create_inline_comment"
