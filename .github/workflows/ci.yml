name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: gofmt check
        if: runner.os != 'Windows'
        run: test -z "$(gofmt -l .)"

      - name: go vet
        run: go vet ./...

      - name: canonical JSON import lint
        if: runner.os != 'Windows'
        run: bash scripts/check-canonical-json.sh

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  spec-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "jsonschema>=4.18"
      - run: python3 spec/validate.py
